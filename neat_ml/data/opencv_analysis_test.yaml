roots:
  work: neat_ml/tests/data/
  results: neat_ml/tests/data/

datasets:
  - id: Test
    method: BubbleSAM OR OpenCV
    class: ''
    time_label: ''
    composition_cols:
      - "Dextran 500 kg/mol (wt%)"
      - "PEO 20 kg/mol (wt%)"
    # with the ``analysis`` key, all of the same per-image and
    # aggregate features are calculated from the outputs
    # of detection using either method (BubbleSAM or OpenCV)
    analysis:
      input_dir: path/to/parquet/files
      composition_csv: path/to/composition/information
      per_image_csv: path/to/save/per/image/csv
      aggregate_csv: path/to/save/aggregate/csv 
      group_cols:
        - Group
        - Label
        - Time
        - Class
      graph_method: radius OR knn OR delaunay
      k_param: required parameter for `graph_method: knn` (int)
      r_param: required parameter for `graph_method: radius` (int or float)

