name: Base CI

on:
  pull_request:
    branches: [ main, nidhin_train_inference_rebase ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: install and lint
      run: |
        python -m pip install -v ".[dev]"
        mypy neat_ml
        ruff check neat_ml
    - name: install fonts
      if: runner.os == 'Linux'
      run: |
        echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
        sudo apt-get update
        sudo apt-get install -y ttf-mscorefonts-installer || true
        sudo fc-cache -f -v
    - name: install openmp
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install libomp
    - name: Set Thread Limit for macOS
      if: runner.os == 'macOS'
      run: |
        echo "Limiting OpenMP to 1 thread for macOS performance"
        echo "OMP_NUM_THREADS=1" >> $GITHUB_ENV
    - name: test
      run: |
        cd /tmp && python -m pytest --pyargs neat_ml --cov=neat_ml --cov-report=term-missing
